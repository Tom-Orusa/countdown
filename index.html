<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<style>
body {
  background: transparent;
  text-align: center;
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: #2b0a3d;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  margin: 20px 0 10px;
  letter-spacing: 1px;
}

#countdown {
  font-size: 34px;
  font-weight: 500;
  margin: 15px 0;
}

.date {
  font-size: 22px;
  font-weight: 300;
  margin-top: 10px;
  letter-spacing: 2px;
}
</style>
</head>

<body>

<h1>Ogni passo ci avvicina:</h1>
<div id="countdown"></div>
<div class="date">6 giugno 2026</div>

<script>
const targetDate = new Date("2026-06-06T00:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const diff = targetDate - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
    days + " giorni " +
    hours + " ore " +
    minutes + " minuti " +
    seconds + " secondi";
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
